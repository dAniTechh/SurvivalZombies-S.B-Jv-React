spring.application.name=demo

# ==========================================
# CONFIGURACIÓN DE BASE DE DATOS MYSQL (DOCKER)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3307/zombies_db?serverTimezone=UTC
spring.datasource.username=zombie_user
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── CONFIGURACIÓN DE HIBERNATE / JPA ──
# Update hace que Spring cree o actualice las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update

#  'true' si en algún momento ver las consultas SQL en la consola
spring.jpa.show-sql=false

# ==========================================
#  (variables de entorno)
# ==========================================
# Debe ser una cadena Base64 de al menos 32 caracteres
jwt.secret=${JWT_SECRET}

# ==========================================
# CONFIGURACIÓN DE BASE DE DATOS MONGODB
# ==========================================
# Conexión local para cuando ejecutas el juego desde el IDE
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=zombies_analytics

# Evita que JPA/Hibernate intente escanear y mapear los documentos de MongoDB
spring.data.jpa.repositories.bootstrap-mode=default
